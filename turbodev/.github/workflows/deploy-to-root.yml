name: Deploy to Custom Domain Root

on:
  push:
    branches:
      - master  # Ho impostato master perché il tuo file esistente usa master
  workflow_dispatch: # Permette di lanciarlo a mano

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TurboDev (Source)
        uses: actions/checkout@v3

      - name: Checkout rosmoscato (Target)
        uses: actions/checkout@v3
        with:
          repository: rosariomoscato/rosmoscato
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: target-repo

      - name: Synchronize files
        run: |
          # Crea la cartella di destinazione se non esiste
          mkdir -p target-repo/turbodev
          # Elimina il contenuto precedente nella cartella turbodev
          rm -rf target-repo/turbodev/*
          # Copia tutti i file (esclusa la cartella .git e la cartella target-repo stessa)
          # Usiamo rsync o un loop per evitare di copiare la cartella di destinazione dentro se stessa
          for file in $(ls -A | grep -v '^target-repo$' | grep -v '^\.git$'); do
            cp -r "$file" target-repo/turbodev/
          done
          
      - name: Commit and Push changes
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add turbodev/
          git commit -m "Auto-update: sync TurboDev to rosmoscato.xyz/turbodev" || echo "No changes to commit"
          git push
